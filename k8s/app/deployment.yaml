apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-frezty-app
  namespace: prod
spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-frezty-app

  template:
    metadata:
      labels:
        app: food-frezty-app

    spec:
      containers:
        - name: food-frezty-app

          image: siddhantk03/food-frezty:v1

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://food-frezty-mysql:3306/foodfrenzy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

            - name: SPRING_DATASOURCE_USERNAME
              value: root

            - name: SPRING_DATASOURCE_PASSWORD
              value: root

          readinessProbe:
            httpGet:
              path: /
              port: 8080

            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080

            initialDelaySeconds: 60
            periodSeconds: 20