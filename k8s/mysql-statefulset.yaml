apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: food-frezty-mysql
  namespace: prod
spec:
  serviceName: food-frezty-mysql

  replicas: 1

  selector:
    matchLabels:
      app: food-frezty-mysql

  template:
    metadata:
      labels:
        app: food-frezty-mysql

    spec:
      containers:
        - name: mysql
          image: mysql:8.0

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -proot

            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc